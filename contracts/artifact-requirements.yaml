{
  "schema": "subpower.artifact-requirements/v1",
  "artifacts": {
    "task_profile": {"required_fields": ["session_id", "producer_agent", "primary_type", "task_goal"]},
    "workflow_plan": {"required_fields": ["session_id", "producer_agent", "workflow_id", "planned_steps"]},
    "agent_invocation_manifest": {"required_fields": ["session_id", "producer_agent", "invocations"]},
    "side_state": {"required_fields": ["session_id", "producer_agent", "sides"]},
    "handoff_packet": {"required_fields": ["session_id", "from_agent", "to_agent", "artifacts"]},
    "implementation_plan": {"required_fields": ["session_id", "producer_agent", "repo_scope", "verification_plan"]},
    "code_change_manifest": {"required_fields": ["session_id", "producer_agent", "files_changed", "verification_results"]},
    "review_decision": {"required_fields": ["session_id", "producer_agent", "decision", "findings"]},
    "board_target": {"required_fields": ["session_id", "producer_agent", "board_target_id", "run_commands", "collect_paths"]},
    "board_session": {"required_fields": ["session_id", "producer_agent", "board", "scenario", "status"]},
    "board_validation_result": {"required_fields": ["session_id", "producer_agent", "status", "evidence_refs"]},
    "board_failure_review": {"required_fields": ["session_id", "producer_agent", "failure_class", "recommended_next", "confidence", "blocking_evidence", "rationale"]},
    "main_route_decision": {"required_fields": ["session_id", "producer_agent", "decision_point_id", "assessor_artifact", "route", "reason", "based_on_artifacts"]},
    "evidence_manifest": {"required_fields": ["session_id", "producer_agent", "status", "evidence"]},
    "closure_matrix": {"required_fields": ["session_id", "producer_agent", "close_allowed", "review_status", "evidence_status", "repo_state", "board_state", "knowledge_state", "blockers"]}
